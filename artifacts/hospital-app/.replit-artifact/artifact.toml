kind = "web"
previewPath = "/"
title = "MedCare Hospital Platform"
version = "1.0.0"
id = "artifacts/hospital-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23777

[services.development]
run = "pnpm --filter @workspace/hospital-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hospital-app", "run", "build" ]
publicDir = "artifacts/hospital-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23777"
BASE_PATH = "/"
